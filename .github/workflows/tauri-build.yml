name: Tauri Build

on:
  workflow_dispatch:

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: my-sticky-notes-tauri-windows
          - os: macos-latest
            artifact-name: my-sticky-notes-tauri-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable pnpm
        run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Tauri frontend
        run: pnpm run check:frontend
      - name: Build Tauri app
        run: pnpm run tauri:build
      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
